query Timeline($scope: TimelineScope!, $first: Int, $after: String) {
  timeline(scope: $scope, first: $first, after: $after) {
    edges {
      node {
        id
        content
        createdAt
        likesCount
        isLikedByMe
        author {
          id
          username
          displayName
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

