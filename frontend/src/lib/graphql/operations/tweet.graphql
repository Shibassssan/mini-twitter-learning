mutation CreateTweet($content: String!) {
  createTweet(content: $content) {
    id
    content
    createdAt
    likesCount
    isLikedByMe
    author {
      id
      username
      displayName
    }
  }
}

mutation DeleteTweet($id: ID!) {
  deleteTweet(id: $id)
}
