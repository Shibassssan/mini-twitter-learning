query SearchTweets($query: String!, $first: Int, $after: String) {
  searchTweets(query: $query, first: $first, after: $after) {
    edges {
      node {
        id
        content
        createdAt
        likesCount
        isLikedByMe
        author {
          id
          username
          displayName
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
